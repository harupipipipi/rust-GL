name: CI MSRV

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Minimum Supported Rust Version
  # softbuffer 0.4 requires >= 1.70
  MSRV: "1.70.0"

jobs:
  msrv:
    name: MSRV check (Rust ${{ env.MSRV }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfreetype6-dev \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libwayland-dev

      - name: cargo check
        run: cargo check --lib
